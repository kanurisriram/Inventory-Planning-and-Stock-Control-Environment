<!DOCTYPE html>
<html>
<head><title>OTP Email</title>
<style>
  * {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: white;
  padding: 40px;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
  color: #203a43;
}

label {
  display: block;
  text-align: left;
  font-weight: 600;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 15px;
  margin-bottom: 15px;
}

input:focus {
  border-color: #2c5364;
}

button {
  width: 100%;
  padding: 12px;
  background: #2c5364;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #203a43;
}

.message {
  margin-top: 15px;
  font-size: 14px;
  color: green;
}

.error {
  color: red;
}

</style>
</head>
<body>
 <div class="container">
  <h2>Forgot Password</h2>

  <label>Email</label>
  <input method="post" type="email" id="email" placeholder="Enter your email">

  <button onclick="sendOTP()">Send Reset Link</button>

  <div id="msg" class="message"></div>
</div>

  <script>
async function sendOTP() {
  const email = document.getElementById("email").value;

  try {
    const res = await fetch("http://127.0.0.1:3000/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message);
      return;
    }

    alert(data.message);

  } catch (error) {
    alert("Backend not running or network error");
  }
}
// 🎯 Read token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (token) {
  document.querySelector(".container").innerHTML = `
    <h2>Reset Password</h2>

    <input type="password" id="newPass" placeholder="New Password"><br><br>
    <input type="password" id="confirmPass" placeholder="Confirm Password"><br><br>

    <button onclick="resetPassword()">Change Password</button>
  `;
}

// 🔐 Reset handler (frontend only for now)
function resetPassword() {
  const p1 = document.getElementById("newPass").value;
  const p2 = document.getElementById("confirmPass").value;

  if (p1 !== p2) {
    alert("Passwords do not match");
    return;
  }

  alert("Password reset successful ");
}


</script>
</body>
</html>
