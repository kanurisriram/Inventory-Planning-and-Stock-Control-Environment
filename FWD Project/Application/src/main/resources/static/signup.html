<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="stylesheet" href="../static/CSS/signup.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO TITLE -->
    <title>Sign Up | Invoice Dashboard - Inventory Planning and Stock Control Environment</title>

    <!-- SEO META TAGS -->
    <meta name="description" content="Create an account for the Invoice Dashboard to manage customers, products, invoices, sales, purchases, and expenses easily.">
    <meta name="keywords" content="invoice dashboard, signup, business management, inventory system, invoice generator">
    <meta name="author" content="Invoice Dashboard System">
    <meta name="robots" content="index, follow">

    <!-- CANONICAL URL -->
    <link rel="canonical" href="https://yourdomain.com/signup.html">

    <!-- SOCIAL MEDIA SEO -->
    <meta property="og:title" content="Signup - Invoice Dashboard">
    <meta property="og:description" content="Register your account to manage invoices, customers, and business finances easily.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/signup.html">

    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="../CSS/signup.css">

</head>

<body>

<h1>Create Your Invoice Dashboard Account</h1>

<form id="signupForm" method="post">

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required><br><br>

    <label for="shopname">Shop Name:</label>
    <input type="text" id="shopname" name="shopname" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required><br><br>

    <label for="confirm_password">Confirm Password:</label>
    <input type="password" id="confirm_password" name="confirm_password" required><br><br>

  

<!-- OTP Verification -->

<h2>Mobile Verification</h2>

<label>Phone Number</label>
<input type="tel" id="profilePhone" placeholder="+91 9876543210">

<br><br>

<button onclick="sendOTP()">Send OTP</button>

<br><br>

<label>Enter OTP</label>
<input type="text" id="otpInput" placeholder="Enter OTP"required>

<br><br>

<button onclick="verifyOTP()">Verify OTP</button><br><br>
  <input type="submit" value="Sign Up">

    <br><br>

    <a href="Loginpage.html">Already have an account? Login</a>

    <br><br>

    <input type="checkbox" id="terms" required>
    I agree to the <a href="/terms">Terms and Conditions</a>

</form>

<script>

document.getElementById("signupForm").addEventListener("submit", function(e) {

    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const shopname = document.getElementById("shopname").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    if (username === "" || shopname === "" || email === "" || password === "") {
        alert("All fields are required!");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    const user = {
        username: username,
        shopname: shopname,
        email: email,
        password: password
    };

    const existingUser = JSON.parse(localStorage.getItem("user"));

    if (existingUser && existingUser.email === email) {
        alert("Account already exists with this email!");
        return;
    }

    localStorage.setItem("user", JSON.stringify(user));

    alert("Signup Successful!");

    window.location.href = "dashboard.html";

});


function sendOTP(){

    const phone = document.getElementById("profilePhone").value;

    if(!phone){
        alert("Enter phone number");
        return;
    }

    const otp = Math.floor(100000 + Math.random()*900000);

    localStorage.setItem("demoOTP", otp);

    alert("Demo OTP: " + otp);

}

function verifyOTP(){

    const otp = document.getElementById("otpInput").value;

    const savedOTP = localStorage.getItem("demoOTP");

    if(otp === savedOTP){
        alert("Mobile verified successfully");
    }else{
        alert("Invalid OTP");
    }

}

</script>

</body>
</html>
